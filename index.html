<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STOPAM</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: #000000;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    main {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 30px 40px;
    }

    .intro {
      margin: 0 0 58px;
      line-height: 1.35;
    }

    .handle {
      margin: 0 0 58px;
    }

    .title {
      margin: 0 0 18px;
      text-align: center;
      font-weight: normal;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .columns-image {
      display: block;
      width: 140px;
      max-width: 100%;
      height: auto;
      margin: 0 auto 64px;
    }

    .binary {
      margin: 0;
      line-height: 1.55;
      white-space: pre-wrap;
      font-weight: bold;
    }

    .binary .normal {
      font-weight: normal;
    }
  </style>
</head>

<body>
  <main>
    <p class="intro">
      Pamatuješ si na mě? Tolik bolesti nemůže zůstat<br>
      bez trestu!
    </p>

    <p class="handle">@ STOPAM</p>

    <h1 class="title">AOPRK VEZNEV S ÍLIČK</h1>

    <!--
      Obrázek se sloupky dej do stejné složky jako index.html
      a pojmenuj ho sloupky.png
    -->
    <img class="columns-image" src="./sloupky.png" alt="Sloupky" />

    <p class="binary"><span class="normal">01000001 01001110 01001110 01000001</span>
00100000 <span class="normal">01000010 01011001 01001100</span>
<span class="normal">01000001</span> 00100000 <span class="normal">01001101 01001111 01001010</span>
<span class="normal">01000101</span> 00100000 <span class="normal">01000100 01000011</span>
<span class="normal">01000101 01010010 01000001</span> 00100001</p>
  </main>
</body>
</html>
