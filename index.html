<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STOPAM</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      background: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 22%, rgba(120, 0, 0, 0.12), transparent 18%),
        radial-gradient(circle at 20% 80%, rgba(0, 0, 0, 0.08), transparent 24%),
        repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.035) 0px,
          rgba(0, 0, 0, 0.035) 1px,
          transparent 1px,
          transparent 6px
        ),
        #ffffff;
      color: #050505;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      letter-spacing: 0.06em;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 14px;
      border: 1px solid rgba(0, 0, 0, 0.35);
      pointer-events: none;
      z-index: 10;
    }

    body::after {
      content: "NEOTÁČEJ SE";
      position: fixed;
      right: -44px;
      top: 45%;
      transform: rotate(90deg);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.42em;
      color: rgba(120, 0, 0, 0.8);
      pointer-events: none;
      z-index: 11;
    }

    main {
      position: relative;
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 54px 40px 62px;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.05), transparent 12%, transparent 88%, rgba(0, 0, 0, 0.035)),
        #ffffff;
      border-left: 3px solid #000;
      border-right: 1px solid rgba(0, 0, 0, 0.45);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.08),
        18px 0 0 rgba(0, 0, 0, 0.035),
        -18px 0 0 rgba(120, 0, 0, 0.04);
    }

    main::before {
      content: "SPIS / STOPAM / 04";
      position: absolute;
      top: 20px;
      left: 40px;
      right: 40px;
      padding-bottom: 7px;
      border-bottom: 2px solid #000;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.28em;
      color: #760000;
    }

    main::after {
      content: "dcera";
      position: absolute;
      bottom: 22px;
      left: 40px;
      padding: 4px 8px;
      border: 1px solid rgba(120, 0, 0, 0.75);
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.24em;
      color: #760000;
      transform: rotate(-2deg);
    }

    .intro {
      position: relative;
      margin: 0 0 62px;
      padding: 18px 16px;
      line-height: 1.5;
      border: 2px solid rgba(0, 0, 0, 0.75);
      background: #ffffff;
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.12);
      text-shadow: 1px 0 rgba(120, 0, 0, 0.25);
    }

    .intro::before {
      content: "VAROVÁNÍ";
      position: absolute;
      top: -24px;
      left: -2px;
      padding: 3px 8px;
      background: #760000;
      color: #ffffff;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.28em;
    }

    .threat {
      display: inline-block;
      padding: 2px 8px 3px;
      background: #000000;
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 2px solid #760000;
      box-shadow:
        3px 3px 0 #760000,
        -1px -1px 0 #000000;
      transform: rotate(-2deg);
    }

    .handle {
      display: inline-block;
      margin: 0 0 64px;
      padding: 8px 12px;
      border: 2px solid #000000;
      background: #ffffff;
      color: #000000;
      font-weight: bold;
      box-shadow: 6px 6px 0 rgba(120, 0, 0, 0.28);
      transform: rotate(-1deg);
    }

    .title {
      position: relative;
      margin: 0 0 28px;
      padding: 9px 6px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-top: 2px solid #000000;
      border-bottom: 2px solid #000000;
      color: #000000;
    }

    .title::before {
      content: "šifra";
      position: absolute;
      left: 0;
      top: -22px;
      font-size: 10px;
      letter-spacing: 0.24em;
      color: #760000;
    }

    .columns-image {
      display: block;
      width: 150px;
      max-width: 100%;
      height: auto;
      margin: 0 auto 70px;
      filter: grayscale(1) contrast(1.65) brightness(0.9);
      mix-blend-mode: multiply;
      transform: rotate(1deg);
    }

    .binary {
      position: relative;
      margin: 0;
      padding: 22px 16px 22px 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-weight: bold;
      border: 2px solid #000000;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(120, 0, 0, 0.08) 0px,
          rgba(120, 0, 0, 0.08) 1px,
          transparent 1px,
          transparent 12px
        ),
        #ffffff;
      box-shadow: 9px 9px 0 rgba(0, 0, 0, 0.16);
    }

    .binary::before {
      content: "PŘEPIS NALEZEN";
      position: absolute;
      top: -26px;
      left: -2px;
      padding: 3px 8px;
      background: #000000;
      color: #ffffff;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.24em;
    }

    .binary::after {
      content: "";
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 36px;
      height: 36px;
      border: 2px solid rgba(120, 0, 0, 0.8);
      border-radius: 50%;
      transform: rotate(-12deg);
    }

    .binary .normal {
      font-weight: normal;
      color: rgba(0, 0, 0, 0.75);
    }

    @media (max-width: 520px) {
      body::before {
        inset: 8px;
      }

      body::after {
        display: none;
      }

      main {
        max-width: none;
        padding: 52px 26px 58px;
        border-left: 2px solid #000;
      }

      main::before {
        left: 26px;
        right: 26px;
      }

      main::after {
        left: 26px;
      }

      .intro {
        padding: 16px 13px;
      }

      .threat {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main>
    <p class="intro">
      Pamatuješ si na mě? Tolik bolesti nemůže zůstat<br>
      bez <strong class="threat">trestu</strong>!
    </p>

    <p class="handle">@ STOPAM</p>

    <h1 class="title">AOPRK VEZNEV S ÍLIČK</h1>

    <img class="columns-image" src="./sloupky.png" alt="Sloupky" />

    <p class="binary"><span class="normal">01000001 01001110 01001110 01000001</span>
00100000 <span class="normal">01000010 01011001 01001100</span>
<span class="normal">01000001</span> 00100000 <span class="normal">01001101 01001111 01001010</span>
<span class="normal">01000101</span> 00100000 <span class="normal">01000100 01000011</span>
<span class="normal">01000101 01010010 01000001</span> 00100001</p>
  </main>
</body>
</html>
