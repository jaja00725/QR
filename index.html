<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STOPAM</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      background: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 20%, rgba(0, 0, 0, 0.035), transparent 28%),
        linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
        #ffffff;
      background-size: auto, 100% 7px, auto;
      color: #050505;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      letter-spacing: 0.05em;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.015) 0,
          rgba(0, 0, 0, 0.015) 1px,
          transparent 1px,
          transparent 5px
        );
      mix-blend-mode: multiply;
      opacity: 0.8;
      z-index: 2;
    }

    body::after {
      content: "NEOTÁČEJ SE";
      position: fixed;
      right: -38px;
      top: 48%;
      transform: rotate(90deg);
      font-size: 10px;
      letter-spacing: 0.4em;
      color: rgba(120, 0, 0, 0.55);
      pointer-events: none;
    }

    main {
      position: relative;
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 42px 38px 52px;
      border-left: 1px solid rgba(0, 0, 0, 0.28);
      border-right: 1px solid rgba(0, 0, 0, 0.12);
      min-height: 100vh;
    }

    main::before {
      content: "";
      position: absolute;
      top: 22px;
      left: 18px;
      right: 18px;
      height: 1px;
      background: rgba(0, 0, 0, 0.35);
    }

    main::after {
      content: "spis / 04 / dcera";
      position: absolute;
      bottom: 18px;
      left: 38px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(0, 0, 0, 0.45);
    }

    .intro {
      position: relative;
      margin: 0 0 58px;
      line-height: 1.45;
      text-shadow: 1px 0 rgba(120, 0, 0, 0.18);
      animation: breathe 5s infinite ease-in-out;
    }

    .intro::before {
      content: "!";
      position: absolute;
      left: -22px;
      top: -4px;
      color: #760000;
      font-weight: bold;
    }

    .threat {
      display: inline-block;
      font-weight: 900;
      color: #760000;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow:
        1px 0 rgba(0, 0, 0, 0.35),
        -1px 0 rgba(120, 0, 0, 0.18),
        0 1px rgba(120, 0, 0, 0.25);
      transform: rotate(-1deg);
    }

    .handle {
      display: inline-block;
      margin: 0 0 58px;
      padding: 5px 9px;
      border: 1px solid rgba(0, 0, 0, 0.55);
      background: #fff;
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.12);
      transform: rotate(-1deg);
    }

    .title {
      position: relative;
      margin: 0 0 22px;
      text-align: center;
      font-weight: normal;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .title::before,
    .title::after {
      content: "";
      display: inline-block;
      width: 34px;
      height: 1px;
      background: rgba(0, 0, 0, 0.55);
      vertical-align: middle;
      margin: 0 10px;
    }

    .columns-image {
      display: block;
      width: 140px;
      max-width: 100%;
      height: auto;
      margin: 0 auto 64px;
      filter: grayscale(1) contrast(1.35) brightness(0.96);
      mix-blend-mode: multiply;
      transform: rotate(0.7deg);
    }

    .binary {
      position: relative;
      margin: 0;
      padding: 18px 14px 18px 18px;
      line-height: 1.65;
      white-space: pre-wrap;
      font-weight: bold;
      border: 1px solid rgba(0, 0, 0, 0.38);
      background:
        linear-gradient(90deg, rgba(120, 0, 0, 0.05), transparent 25%),
        #ffffff;
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.04),
        7px 7px 0 rgba(0, 0, 0, 0.08);
    }

    .binary::before {
      content: "přepis nalezen";
      position: absolute;
      top: -20px;
      left: 0;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(120, 0, 0, 0.75);
    }

    .binary::after {
      content: "";
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(120, 0, 0, 0.55);
      border-radius: 50%;
      opacity: 0.55;
    }

    .binary .normal {
      font-weight: normal;
      color: rgba(0, 0, 0, 0.82);
    }

    @keyframes breathe {
      0%, 100% {
        opacity: 1;
        transform: translateX(0);
      }

      50% {
        opacity: 0.86;
        transform: translateX(1px);
      }
    }

    @media (max-width: 520px) {
      main {
        max-width: none;
        padding: 36px 26px 50px;
        border-left: none;
        border-right: none;
      }

      body::after {
        display: none;
      }

      .title::before,
      .title::after {
        width: 18px;
        margin: 0 6px;
      }
    }
  </style>
</head>

<body>
  <main>
    <p class="intro">
      Pamatuješ si na mě? Tolik bolesti nemůže zůstat<br>
      bez <strong class="threat">trestu</strong>!
    </p>

    <p class="handle">@ STOPAM</p>

    <h1 class="title">AOPRK VEZNEV S ÍLIČK</h1>

    <!--
      Obrázek se sloupky dej do stejné složky jako index.html
      a pojmenuj ho sloupky.png
    -->
    <img class="columns-image" src="./sloupky.png" alt="Sloupky" />

    <p class="binary"><span class="normal">01000001 01001110 01001110 01000001</span>
00100000 <span class="normal">01000010 01011001 01001100</span>
<span class="normal">01000001</span> 00100000 <span class="normal">01001101 01001111 01001010</span>
<span class="normal">01000101</span> 00100000 <span class="normal">01000100 01000011</span>
<span class="normal">01000101 01010010 01000001</span> 00100001</p>
  </main>
</body>
</html>
