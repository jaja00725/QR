<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STOPAM</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      background: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 18%, rgba(0, 0, 0, 0.07), transparent 24%),
        radial-gradient(circle at 12% 78%, rgba(120, 0, 0, 0.05), transparent 26%),
        repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.026) 0px,
          rgba(0, 0, 0, 0.026) 1px,
          transparent 1px,
          transparent 7px
        ),
        #ffffff;
      color: #050505;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      letter-spacing: 0.06em;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 18px;
      border: 1px solid rgba(0, 0, 0, 0.28);
      pointer-events: none;
      z-index: 10;
    }

    main {
      position: relative;
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 54px 40px 62px;
      min-height: 100vh;
      background:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.05),
          transparent 13%,
          transparent 87%,
          rgba(0, 0, 0, 0.035)
        ),
        #ffffff;
      border-left: 2px solid rgba(0, 0, 0, 0.8);
      border-right: 1px solid rgba(0, 0, 0, 0.25);
      box-shadow:
        18px 0 0 rgba(0, 0, 0, 0.035),
        -18px 0 0 rgba(120, 0, 0, 0.035);
    }

    main::before {
      content: "";
      position: absolute;
      top: 28px;
      left: 40px;
      right: 40px;
      height: 2px;
      background: #000000;
      opacity: 0.85;
    }

    main::after {
      content: "";
      position: absolute;
      bottom: 24px;
      left: 40px;
      width: 64px;
      height: 1px;
      background: rgba(120, 0, 0, 0.75);
      transform: rotate(-2deg);
    }

    .section {
      position: relative;
      background: #ffffff;
    }

    .intro-section {
      margin: 0 0 54px;
      padding: 18px 16px;
      line-height: 1.5;
      border: 2px solid rgba(0, 0, 0, 0.7);
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.12);
      text-shadow: 1px 0 rgba(120, 0, 0, 0.2);
    }

    .intro-section::before {
      content: "";
      position: absolute;
      left: -13px;
      top: -13px;
      width: 26px;
      height: 26px;
      border-left: 2px solid #760000;
      border-top: 2px solid #760000;
    }

    .intro-section::after {
      content: "";
      position: absolute;
      right: -13px;
      bottom: -13px;
      width: 26px;
      height: 26px;
      border-right: 2px solid #760000;
      border-bottom: 2px solid #760000;
    }

    .intro {
      margin: 0;
    }

    .threat {
      font-weight: 900;
      color: #000000;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow:
        1px 0 #000000,
        0 1px rgba(120, 0, 0, 0.5);
    }

    .handle-section {
      margin: 0 0 58px;
    }

    .handle {
      display: inline-block;
      margin: 0;
      padding: 8px 12px;
      border: 2px solid #000000;
      background: #ffffff;
      color: #000000;
      font-weight: normal;
      box-shadow: 6px 6px 0 rgba(120, 0, 0, 0.22);
      transform: rotate(-1deg);
    }

    .image-section {
      margin: 0 0 68px;
      padding: 12px 14px 18px;
      border-top: 2px solid #000000;
      border-bottom: 2px solid #000000;
      background: #ffffff;
    }

    .title {
      margin: 0 0 10px;
      text-align: center;
      font-weight: normal;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #000000;
    }

    .columns-image {
      display: block;
      width: 150px;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      filter: grayscale(1) contrast(1.65) brightness(0.9);
      mix-blend-mode: multiply;
      transform: rotate(1deg);
    }

    .binary-section {
      margin: 0;
    }

    .binary {
      position: relative;
      margin: 0;
      padding: 22px 16px 22px 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-weight: bold;
      border: 2px solid #000000;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(120, 0, 0, 0.07) 0px,
          rgba(120, 0, 0, 0.07) 1px,
          transparent 1px,
          transparent 12px
        ),
        #ffffff;
      box-shadow: 9px 9px 0 rgba(0, 0, 0, 0.16);
    }

    .binary .normal {
      font-weight: normal;
      color: rgba(0, 0, 0, 0.75);
    }

    @media (max-width: 520px) {
      body::before {
        inset: 8px;
      }

      main {
        max-width: none;
        padding: 52px 26px 58px;
        border-left: 2px solid #000;
      }

      main::before {
        left: 26px;
        right: 26px;
      }

      main::after {
        left: 26px;
      }

      .intro-section {
        padding: 16px 13px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="section intro-section">
      <p class="intro">
        Pamatuješ si na mě? Tolik bolesti nemůže zůstat<br>
        bez <strong class="threat">TREST</strong>U!
      </p>
    </section>

    <section class="section handle-section">
      <p class="handle">@ STOPAM</p>
    </section>

    <section class="section image-section">
      <h1 class="title">AOPRK VEZNEV S ÍLIČK</h1>

      <img class="columns-image" src="./sloupky.png" alt="Sloupky" />
    </section>

    <section class="section binary-section">
      <p class="binary"><span class="normal">01000001 01001110 01001110 01000001</span>
00100000 <span class="normal">01000010 01011001 01001100</span>
<span class="normal">01000001</span> 00100000 <span class="normal">01001101 01001111 01001010</span>
<span class="normal">01000101</span> 00100000 <span class="normal">01000100 01000011</span>
<span class="normal">01000101 01010010 01000001</span> 00100001</p>
    </section>
  </main>
</body>
</html>
